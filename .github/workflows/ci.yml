name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  core:
    name: Rust core
    runs-on: windows-latest
    defaults:
      run:
        working-directory: core
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      - name: Test
        run: cargo test --target-dir target-ci

  web:
    name: Web build
    runs-on: windows-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

  network:
    name: Worker typecheck
    runs-on: windows-latest
    defaults:
      run:
        working-directory: network
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: network/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck
