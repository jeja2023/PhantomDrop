name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  core:
    name: Rust core
    runs-on: windows-latest
    defaults:
      run:
        working-directory: core
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.88.0

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      - name: Format check
        run: cargo fmt --check

      - name: Clippy check
        run: cargo clippy --locked --all-targets --all-features --target-dir target-ci -- -D warnings

      - name: Test
        run: cargo test --locked --target-dir target-ci

  web:
    name: Web build
    runs-on: windows-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.17.0
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint check
        run: npm run lint

      - name: Build
        run: npm run build

  network:
    name: Worker typecheck
    runs-on: windows-latest
    defaults:
      run:
        working-directory: network
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.17.0
          cache: npm
          cache-dependency-path: network/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

  docker:
    name: Docker clean build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build --tag phantom-drop:ci .

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.88.0

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Audit Rust dependencies
        working-directory: core
        run: cargo audit

      - name: Audit web dependencies
        working-directory: web
        run: npm audit --audit-level=moderate

      - name: Audit Worker dependencies
        working-directory: network
        run: npm audit --audit-level=moderate
