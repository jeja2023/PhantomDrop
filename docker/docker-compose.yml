services:
  core:
    build:
      context: ..
      dockerfile: docker/Dockerfile.core
    container_name: phantomdrop-core
    restart: unless-stopped
    environment:
      HUB_SECRET: ${HUB_SECRET:-local_dev_secret}
      PHANTOM_DB_URL: ${PHANTOM_DB_URL:-sqlite:///app/data/phantom_core.db?mode=rwc}
    volumes:
      - phantomdrop_data:/app/data
    ports:
      - "4000:4000"

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    container_name: phantomdrop-web
    restart: unless-stopped
    depends_on:
      - core
    ports:
      - "8080:80"

volumes:
  phantomdrop_data:
