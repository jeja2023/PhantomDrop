services:
  phantom-drop:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: phantom-drop-app
    restart: unless-stopped
    # 针对低内存 VPS 优化：弃用 xvfb-run，直接运行后端程序
    command: [ "/app/phantom-core" ]
    tty: true
    stdin_open: true
    environment:
      - APP_ENV=${APP_ENV:-development}
      - PHANTOM_DB_URL=${PHANTOM_DB_URL:-sqlite:///app/data/phantom_core.db?mode=rwc}
      - BIND_ADDR=${BIND_ADDR:-0.0.0.0}
      - PORT=${PORT:-9010}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://127.0.0.1:5173,http://localhost:5173,http://127.0.0.1:9010,http://localhost:9010}
      - ENABLE_DEBUG_ASSETS=${ENABLE_DEBUG_ASSETS:-false}
      - WRITE_CODEX_AUTH_FILE=${WRITE_CODEX_AUTH_FILE:-false}
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
      - CLOUDFLARE_ZONE_ID=${CLOUDFLARE_ZONE_ID}
      - RUST_BACKTRACE=1
    volumes:
      - ./data:/app/data
      - ./.automation:/app/.automation
    ports:
      - "9010:9010"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  data:
  automation:
