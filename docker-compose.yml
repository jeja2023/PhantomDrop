services:
  phantom-drop:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: phantom-drop-app
    restart: unless-stopped
    # 针对低内存 VPS 优化：弃用 xvfb-run，直接运行后端程序
    command: ["/app/phantom-core"]
    tty: true
    stdin_open: true
    environment:
      - HUB_SECRET=${HUB_SECRET:-local_dev_secret}
      - PHANTOM_DB_URL=${PHANTOM_DB_URL:-sqlite:///app/data/phantom_core.db?mode=rwc}
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
      - CLOUDFLARE_ZONE_ID=${CLOUDFLARE_ZONE_ID}
      - RUST_BACKTRACE=1
    volumes:
      - ./data:/app/data
      - ./.automation:/app/.automation
    ports:
      - "9010:9010"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  data:
  automation:
